# Phase-1 ur-straddle for the spangap platform.
#
# This is the wrapper that lets the existing spangap-core/ (firmware) + browser/
# (Vue/Quasar) tree be picked up by the new straddles workflow without any
# decomposition. Phase 2 splits networking/auth/web stack out into a sibling
# `spangap/spangap-web` straddle and the LCD launcher into `spangap/lcd`; until
# then, both halves live here.
schema_version: 1
name: spangap/spangap-core
prefix: ""                 # platform symbols read as language primitives (storageGet, cliRegister, info, ...)
version: 0.0.0
# Firmware identity — the platform's own fallback values. spangap-core sits at
# the bottom of every dependency tree, so whatever a downstream straddle sets
# wins over these; a bare spangap-core build shows them.
stub: spangap
display_name: Spangap
banner: spangap device
default_hostname: spangap
firmware: esp-idf         # ESP-IDF managed component. The build CLI stages this into
                          # staging/components/spangap__spangap-core/ at build time, so
                          # the source-tree dirname is independent of the eventual
                          # ESP-IDF component name consumers see (`spangap-core`).
browser: browser
platforms: [idf]
# Auto-init: storage + cron used to be the consumer's responsibility (called
# by hand in app_main after spangapInit()); they're now folded into the
# generated spangapInitStraddles() dispatcher. core heads the dispatcher's
# platform band (see spangap-inside PLATFORM_ORDER), so these run first of all —
# before net/web/lcd and every other straddle. The foundational primitives
# (fs/log/cli/pm/auth) still come up via the explicit spangapInit() call the
# buildable makes before the dispatcher; only the storage task and cron move
# here. Everything the dispatcher starts afterwards can rely on storage being
# live (settings already loaded by spangapInit) and cron being registered.
init:
  - call: storageInit
  - call: cronInit
